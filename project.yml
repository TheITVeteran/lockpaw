name: Lockpaw
options:
  bundleIdPrefix: com.eriknielsen
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Lockpaw:
    type: application
    platform: macOS
    sources:
      - path: Lockpaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eriknielsen.lockpaw
        PRODUCT_NAME: Lockpaw
        INFOPLIST_FILE: Lockpaw/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lockpaw/Lockpaw.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
